  for (const ent of entities) {
    if (!ent._portalTravel) continue;
    ent._portalTravel.timer -= dt;
    const t = ent._portalTravel;
    const progress = 1 - (t.timer / t.total);
    // Move entity along the path (hidden, but position updates for trail)
    ent.x = t.startX + (t.endX - t.startX) * progress;
    ent.y = t.startY + (t.endY - t.startY) * progress;

    if (t.timer <= 0) {
      // Arrived
      ent.x = t.endX;
      ent.y = t.endY;
      ent.vx = 0; ent.vy = 0;
      ent.trail = [];
      ent._portalTravel = null;
      ent._portalHidden = false;
      burst(ent.x, ent.y, '#9944ff', 15);
      floatingTexts.push({ x: ent.x, y: ent.y - 20, text: 'ARRIVED', color: '#9944ff', life: 1.0 });
    }
  }

  // Remove used portal pairs after both are used
  for (let i = portals.length - 1; i >= 0; i--) {
    if (portals[i].used) {
      // Check if the traveling entity has arrived
      const hasActiveTraveler = entities.some(e => e._portalTravel && e._portalTravel.endX !== undefined);
      if (!hasActiveTraveler) {
        portals.splice(i, 1);
      }
    }
  }

  // Lava damage — 500 score per second, first tick instant on contact
  for (const ent of entities) {
    // Check if entity is on lava
    let inLava = false;
    // Shrink tunnels and shield protect from lava
    if (!isInsideTunnel(ent) && !ent.effects.shield) {
      for (const lz of lavaZones) {
        if (ent.x > lz.x && ent.x < lz.x + lz.w && ent.y > lz.y && ent.y < lz.y + lz.h) {
          inLava = true; break;
        }
      }
    }

    if (inLava) {
      function applyLavaDamage(ent) {
        ent.score -= 500;
        floatingTexts.push({ x: ent.x, y: ent.y - 20, text: '-500', color: '#ff4444', life: 1.0 });
      }
      if (!ent.onLava) {
        ent.onLava = true;
        ent.lavaTimer = 0;
        applyLavaDamage(ent);
      } else {
        ent.lavaTimer += dt;
        if (ent.lavaTimer >= 1000) {
          ent.lavaTimer -= 1000;
          applyLavaDamage(ent);
        }
      }
    } else {
      ent.onLava = false;
      ent.lavaTimer = 0;
    }
  }

  // Meteors
  if (meteorsEnabled) {
    meteorTimer -= dt;
    if (meteorTimer <= 0) {
      // Spawn a new meteor targeting a random player
      const target = entities[Math.floor(Math.random() * entities.length)];
      // Size: between 1/12 and 1/3 of map (use shorter dimension)
      const minSize = Math.min(W, H) / 16;
      const maxSize = Math.min(W, H) / 2.5;
      const radius = minSize + Math.random() * (maxSize - minSize);
      // Bigger meteors get longer warnings (2.25-3.75 seconds, 25% less than before)
      const warningTime = 1350 + ((radius - minSize) / (maxSize - minSize)) * 900;
      // Target near the player with some offset
      const offsetX = (Math.random() - 0.5) * radius * 0.5;
      const offsetY = (Math.random() - 0.5) * radius * 0.5;
      const mx = target.x + offsetX;
      const my = target.y + offsetY;
      meteors.push({
        x: mx, y: my, radius,
        warningTime, timer: warningTime,
        hit: false
      });
      // 6 meteors/min for 4 players, +2 per extra player
      const meteorsPerMin = 6 + Math.max(0, entities.length - 4) * 2;
      meteorTimer = 60000 / meteorsPerMin;
    }

    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.timer -= dt;

      if (m.timer <= 0 && !m.hit) {
        // IMPACT
        m.hit = true;
        if (gameMode === 'infect') {
          // Infect mode: survivors get infected, IT players get REMOVED
          const infectHitSurvivors = [];
          const infectHitIT = [];
          for (const ent of entities) {
            const d = Math.hypot(ent.x - m.x, ent.y - m.y);
            if (d < m.radius) {
              if (ent.effects.shield) {
                burst(ent.x, ent.y, '#ff00ff', 10);
                floatingTexts.push({ x: ent.x, y: ent.y - 20, text: 'SHIELDED', color: '#ff00ff', life: 1.0 });
                continue;
              }
              if (ent.infected) {
                infectHitIT.push(ent);
              } else {
                infectHitSurvivors.push(ent);
              }
            }
          }
          // Infect survivors
          for (const ent of infectHitSurvivors) {
            ent.infected = true;
            burst(ent.x, ent.y, '#ff4444', 15);
            floatingTexts.push({ x: ent.x, y: ent.y - 20, text: 'INFECTED', color: '#ff4444', life: 1.2 });
            showMessage(ent.name + ' infected by meteor!', 1200);
          }
          // Remove IT players
          for (const ent of infectHitIT) {
            floatingTexts.push({ x: ent.x, y: ent.y - 20, text: 'REMOVED', color: '#ff6600', life: 1.2 });
            showMessage(ent.name + ' destroyed!', 1200);
            removeEntity(ent);
          }
          // Check win conditions
          if (!entities.some(e => e.infected)) { endGame(null, false); return; }
          const survivors = entities.filter(e => !e.infected);
          if (survivors.length === 0) { endGame(null, true); return; }
        } else if (gameMode === 'elimination') {
          // Elimination: kill hit players
          const hitList = [];
          for (const ent of entities) {
            const d = Math.hypot(ent.x - m.x, ent.y - m.y);
            if (d < m.radius) {
              if (ent.effects.shield) {
                burst(ent.x, ent.y, '#ff00ff', 10);
                floatingTexts.push({ x: ent.x, y: ent.y - 20, text: 'SHIELDED', color: '#ff00ff', life: 1.0 });
                continue;
              }
              hitList.push(ent);
              burst(ent.x, ent.y, '#ff6600', 15);
              floatingTexts.push({ x: ent.x, y: ent.y - 20, text: 'ELIMINATED', color: '#ff4400', life: 1.5 });
            }
          }
          for (const ent of hitList) {
            if (entities.length <= 1) break;
            showMessage(ent.name + ' destroyed!', 1200);
            const idx = entities.indexOf(ent);
            if (idx === -1) continue;
            entities.splice(idx, 1);
            for (let j = 0; j < entities.length; j++) entities[j].index = j;
            if (itIndex >= entities.length) itIndex = 0;
            if (entities.length <= 1) {
              endGame(entities[0] || null);
              return;
            }
          }
          if (hitList.length > 0) buildHUD();
        } else {
          // Classic: lose 50% score (everyone including IT)
          for (const ent of entities) {
            const d = Math.hypot(ent.x - m.x, ent.y - m.y);
            if (d < m.radius) {
              if (ent.effects.shield) {
                burst(ent.x, ent.y, '#ff00ff', 10);
                floatingTexts.push({ x: ent.x, y: ent.y - 20, text: 'SHIELDED', color: '#ff00ff', life: 1.0 });
                continue;
              }
              burst(ent.x, ent.y, '#ff6600', 15);
              if (ent.score < 0) {
                // Negative score: double the debt
                const penalty = Math.floor(Math.abs(ent.score));
                ent.score -= penalty; // e.g. -200 becomes -400
                floatingTexts.push({ x: ent.x, y: ent.y - 20, text: '-' + penalty, color: '#ff6600', life: 1.0 });
              } else {
                const lost = Math.floor(ent.score * 0.5);
                ent.score -= lost;
                floatingTexts.push({ x: ent.x, y: ent.y - 20, text: lost > 0 ? '-' + lost : '-0', color: '#ff6600', life: 1.0 });
              }
            }
          }
        }
        // Impact particles
        burst(m.x, m.y, '#ff4400', 30);
        burst(m.x, m.y, '#ffaa00', 20);
      }

      // Remove after impact animation (500ms after hit)
      if (m.hit && m.timer < -500) {
        meteors.splice(i, 1);
      }
    }
  }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    const ftScale = dt / 16.67;
    ft.y -= 0.8 * ftScale;
    ft.life -= 0.015 * ftScale;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const pScale = dt / 16.67;
    p.x += p.vx * pScale; p.y += p.vy * pScale;
    p.vx *= Math.pow(0.96, pScale); p.vy *= Math.pow(0.96, pScale);
    p.life -= 0.025 * pScale;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update HUD — sorted by score (left = highest)
  const sorted = [...entities].sort((a, b) => b.score - a.score);
  for (let rank = 0; rank < entities.length; rank++) {
    const ent = sorted[rank];
    const i = ent.index;
    const hud = document.getElementById('hud-' + i);
    if (!hud) continue;
    const isIt = entities[itIndex] === ent;
    hud.classList.toggle('is-it', isIt);
    hud.style.order = rank; // CSS order for left-to-right ranking

    // Name with rank
    const rankLabel = '#' + (rank + 1);
    const crown = rank === 0 && gameMode !== 'elimination' ? ' \u{1F451}' : '';
    document.getElementById('hud-name-' + i).innerHTML =
      `<span style="color:${ent.color}">${rankLabel} ${ent.name}${ent.isHuman ? '' : ' (AI)'}${crown}</span>`;

    if (gameMode === 'elimination') {
      document.getElementById('hud-score-' + i).textContent =
        (isIt ? 'IT' : 'Safe') + ' | ' + entities.length + ' left';
    } else if (gameMode === 'infect') {
      const survivors = entities.filter(e => !e.infected).length;
      document.getElementById('hud-score-' + i).textContent =
        (ent.infected ? 'INFECTED' : 'Survivor') + ' | ' + survivors + ' alive';
    } else {
      document.getElementById('hud-score-' + i).textContent =
        (isIt ? 'IT | ' : '') + Math.floor(ent.score) + ' pts';
    }

    const active = Object.keys(ent.effects);
    let fxText = active.length
      ? active.map(e => {
          if (e === 'bullet') return 'Bullet x' + ent.bulletAmmo;
          const name = e.charAt(0).toUpperCase() + e.slice(1);
          return name + ' ' + (ent.effects[e]/1000).toFixed(1) + 's';
        }).join(' | ')
      : '';
    if (ent.tagFreezeTimer > 0) fxText = 'TAGGED! ' + (ent.tagFreezeTimer/1000).toFixed(1) + 's';
    if (dashEnabled && ent.dashCooldown > 0) {
      fxText += (fxText ? ' | ' : '') + 'Dash ' + (ent.dashCooldown/1000).toFixed(1) + 's';
    } else if (dashEnabled && !ent.effects.bullet) {
      fxText += (fxText ? ' | ' : '') + 'Dash READY';
    }
    document.getElementById('hud-fx-' + i).textContent = fxText;
  }
}

function draw() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  if (!gameRunning) return;

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Lava zones — lightweight rendering (no gradients per frame)
  for (const lz of lavaZones) {
    lz.pulse += 0.015;
    const t = lz.pulse;

    // Dark base
    ctx.fillStyle = '#2a0800';
    ctx.fillRect(lz.x, lz.y, lz.w, lz.h);

    // Bright molten fill with pulsing opacity
    ctx.fillStyle = `rgba(160, 30, 0, ${0.5 + Math.sin(t) * 0.1})`;
    ctx.fillRect(lz.x, lz.y, lz.w, lz.h);

    // 3 flowing lava rivers (simple lines, no per-pixel steps)
    for (let r = 0; r < 3; r++) {
      ctx.beginPath();
      ctx.lineWidth = 3;
      const yBase = lz.y + (r + 1) * lz.h / 4;
      ctx.moveTo(lz.x, yBase + Math.sin(t + r) * 8);
      // Use fewer points (every 20px instead of 8px)
      for (let sx = 0; sx <= lz.w; sx += 20) {
        const sy = yBase + Math.sin(t * 0.6 + sx * 0.03 + r * 2.3) * 10;
        ctx.lineTo(lz.x + sx, sy);
      }
      ctx.strokeStyle = `rgba(255, ${90 + r * 20}, 0, 0.35)`;
      ctx.stroke();
    }

    // 3 hot spots (simple filled circles, no gradients)
    for (let p = 0; p < 3; p++) {
      const px = lz.x + ((Math.sin(t * 0.3 + p * 2.1) + 1) / 2) * lz.w;
      const py = lz.y + ((Math.cos(t * 0.25 + p * 2.7) + 1) / 2) * lz.h;
      const pr = 8 + Math.sin(t * 0.7 + p) * 4;
      ctx.globalAlpha = 0.4 + Math.sin(t + p) * 0.15;
      ctx.fillStyle = '#ff8020';
      ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath(); ctx.arc(px, py, pr * 0.4, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // 2 dark crust patches
    for (let c = 0; c < 2; c++) {
      const cx2 = lz.x + ((Math.sin(t * 0.15 + c * 2.5) + 1) / 2) * (lz.w - 20) + 10;
      const cy2 = lz.y + ((Math.cos(t * 0.12 + c * 3.1) + 1) / 2) * (lz.h - 20) + 10;
      ctx.fillStyle = 'rgba(30, 8, 0, 0.5)';
      ctx.beginPath(); ctx.arc(cx2, cy2, 8, 0, Math.PI * 2); ctx.fill();
    }

    // Border
    ctx.strokeStyle = 'rgba(255, 60, 0, 0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(lz.x, lz.y, lz.w, lz.h);
    ctx.strokeStyle = 'rgba(255, 80, 0, 0.12)';
    ctx.lineWidth = 6;
    ctx.strokeRect(lz.x - 2, lz.y - 2, lz.w + 4, lz.h + 4);
  }

  // Meteor warnings and impacts
  for (const m of meteors) {
    const progress = 1 - (m.timer / m.warningTime); // 0 = just spawned, 1 = impact
    if (!m.hit) {
      // Warning circle — gets more opaque and solid as impact approaches
      const pulseRate = 3 + progress * 8; // pulse faster near impact
      const pulse = 0.5 + Math.sin(Date.now() / 1000 * pulseRate) * 0.3;
      const alpha = 0.1 + progress * 0.35;

      // Outer fill
      ctx.fillStyle = `rgba(255, 30, 0, ${alpha * pulse * 0.5})`;
      ctx.beginPath(); ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2); ctx.fill();

      // Ring
      ctx.strokeStyle = `rgba(255, 50, 0, ${0.3 + progress * 0.5})`;
      ctx.lineWidth = 2 + progress * 3;
      ctx.beginPath(); ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2); ctx.stroke();

      // Inner ring closing in
      const innerR = m.radius * (1 - progress);
      if (innerR > 5) {
        ctx.strokeStyle = `rgba(255, 100, 0, ${0.2 + progress * 0.4})`;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 6]);
        ctx.beginPath(); ctx.arc(m.x, m.y, innerR, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
      }

      // Crosshair
      ctx.strokeStyle = `rgba(255, 80, 0, ${0.2 + progress * 0.3})`;
      ctx.lineWidth = 1;
      const cr = m.radius * 0.3;
      ctx.beginPath(); ctx.moveTo(m.x - cr, m.y); ctx.lineTo(m.x + cr, m.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(m.x, m.y - cr); ctx.lineTo(m.x, m.y + cr); ctx.stroke();

      // Timer text
      const secsLeft = Math.max(0, m.timer / 1000).toFixed(1);
      ctx.fillStyle = `rgba(255, 80, 0, ${0.5 + progress * 0.5})`;
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(secsLeft + 's', m.x, m.y);
    } else {
      // Impact flash — fades out
      const fadeProgress = Math.min(1, -m.timer / 500);
      const flashAlpha = Math.max(0, 1 - fadeProgress);
      ctx.fillStyle = `rgba(255, 100, 0, ${flashAlpha * 0.4})`;
      ctx.beginPath(); ctx.arc(m.x, m.y, m.radius * (1 + fadeProgress * 0.3), 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = `rgba(255, 200, 50, ${flashAlpha * 0.6})`;
      ctx.lineWidth = 4 * flashAlpha;
      ctx.beginPath(); ctx.arc(m.x, m.y, m.radius * (0.5 + fadeProgress * 0.8), 0, Math.PI * 2); ctx.stroke();
    }
  }

  // Obstacles
  for (const o of obstacles) {
    ctx.fillStyle = o.color;
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.strokeStyle = o.isTunnel ? 'rgba(255,180,50,0.2)' : 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    ctx.strokeRect(o.x, o.y, o.w, o.h);
  }

  // Tunnel gap indicators and rounded entrances
  for (const t of tunnels) {
    const halfGap = t.gap / 2;
    const entryR = halfGap; // rounded entrance radius matches gap

    if (t.horizontal) {
      const halfLen = t.walls[0].w / 2;
      // Rounded entrance arcs at both ends
      ctx.fillStyle = 'rgba(255,180,50,0.08)';
      // Left entrance
      ctx.beginPath();
      ctx.arc(t.cx - halfLen, t.cy, entryR, -Math.PI/2, Math.PI/2);
      ctx.fill();
      // Right entrance
      ctx.beginPath();
      ctx.arc(t.cx + halfLen, t.cy, entryR, Math.PI/2, -Math.PI/2);
      ctx.fill();
      // Entrance outlines
      ctx.strokeStyle = 'rgba(255,180,50,0.25)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(t.cx - halfLen, t.cy, entryR, -Math.PI/2, Math.PI/2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(t.cx + halfLen, t.cy, entryR, Math.PI/2, -Math.PI/2);
      ctx.stroke();
    } else {
      const halfLen = t.walls[0].h / 2;
      // Top entrance
      ctx.fillStyle = 'rgba(255,180,50,0.08)';
      ctx.beginPath();
      ctx.arc(t.cx, t.cy - halfLen, entryR, Math.PI, 0);
      ctx.fill();
      // Bottom entrance
      ctx.beginPath();
      ctx.arc(t.cx, t.cy + halfLen, entryR, 0, Math.PI);
      ctx.fill();
      // Entrance outlines
      ctx.strokeStyle = 'rgba(255,180,50,0.25)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(t.cx, t.cy - halfLen, entryR, Math.PI, 0);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(t.cx, t.cy + halfLen, entryR, 0, Math.PI);
      ctx.stroke();
    }

    // Dashed center line
    ctx.strokeStyle = 'rgba(255,180,50,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    if (t.horizontal) {
      ctx.beginPath();
      ctx.moveTo(t.cx - t.walls[0].w/2, t.cy);
      ctx.lineTo(t.cx + t.walls[0].w/2, t.cy);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(t.cx, t.cy - t.walls[0].h/2);
      ctx.lineTo(t.cx, t.cy + t.walls[0].h/2);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // "R" label
    ctx.fillStyle = 'rgba(255,180,50,0.35)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('R', t.cx, t.cy);
  }

  // Orbs
  for (const orb of orbs) {
    const pulse = 1 + Math.sin(orb.pulse) * 0.2;
    const r = orb.r * pulse;
    const grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, r * 3);
    grad.addColorStop(0, orb.type.color + '66');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(orb.x, orb.y, r*3, 0, Math.PI*2); ctx.fill();

    if (orb.type.effect === 'star') {
      // Draw starfish shape
      const arms = 5;
      const outerR = r * 1.2;
      const innerR = r * 0.5;
      const rot = orb.pulse * 0.5; // slow rotation
      ctx.fillStyle = orb.type.color;
      ctx.beginPath();
      for (let i = 0; i < arms * 2; i++) {
        const angle = rot + (i * Math.PI / arms) - Math.PI / 2;
        const rad = i % 2 === 0 ? outerR : innerR;
        const px = orb.x + Math.cos(angle) * rad;
        const py = orb.y + Math.sin(angle) * rad;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      // Inner highlight
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      for (let i = 0; i < arms * 2; i++) {
        const angle = rot + (i * Math.PI / arms) - Math.PI / 2;
        const rad = (i % 2 === 0 ? outerR : innerR) * 0.5;
        const px = orb.x + Math.cos(angle) * rad;
        const py = orb.y + Math.sin(angle) * rad;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = orb.type.color;
      ctx.beginPath(); ctx.arc(orb.x, orb.y, r, 0, Math.PI*2); ctx.fill();
      // Draw letter on orb
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.round(r * 1.3) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(orb.type.letter, orb.x, orb.y + 1);
    }
  }

  // Portals
  for (const p of portals) {
    if (p.used) continue; // don't draw used portals
    const t = p.pulse;
    const occupied = false;

    // Outer swirl ring
    ctx.strokeStyle = occupied ? 'rgba(153, 68, 255, 0.6)' : 'rgba(153, 68, 255, 0.35)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 4 + Math.sin(t * 2) * 2, 0, Math.PI * 2); ctx.stroke();

    // Inner spinning arcs
    for (let a = 0; a < 3; a++) {
      const angle = t * 1.5 + a * (Math.PI * 2 / 3);
      ctx.strokeStyle = `rgba(180, 100, 255, ${0.4 + Math.sin(t + a) * 0.15})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r - 2, angle, angle + Math.PI * 0.5);
      ctx.stroke();
    }

    // Center fill
    ctx.fillStyle = occupied ? 'rgba(120, 50, 200, 0.5)' : 'rgba(80, 30, 160, 0.3)';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r - 3, 0, Math.PI * 2); ctx.fill();

    // Bright core
    ctx.fillStyle = `rgba(200, 150, 255, ${0.3 + Math.sin(t * 3) * 0.15})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();

  }

  // Bullets
  for (const b of bullets) {
    // Glow
    const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, BULLET_RADIUS * 3);
    grad.addColorStop(0, b.color + '88');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(b.x, b.y, BULLET_RADIUS * 3, 0, Math.PI*2); ctx.fill();
    // Bullet
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, BULLET_RADIUS, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, BULLET_RADIUS * 0.4, 0, Math.PI*2); ctx.fill();
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Floating damage texts
  for (const ft of floatingTexts) {
    ctx.globalAlpha = ft.life;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;

  // Draw portal travel trails (faint line from start to current position)
  for (const ent of entities) {
    if (!ent._portalTravel) continue;
    const t = ent._portalTravel;
    const progress = 1 - (t.timer / t.total);
    // Draw faint dotted trail from start to current pos
    const steps = 15;
    for (let s = 0; s <= steps; s++) {
      const sp = s / steps;
      if (sp > progress) break;
      const px = t.startX + (t.endX - t.startX) * sp;
      const py = t.startY + (t.endY - t.startY) * sp;
      ctx.globalAlpha = 0.15 + sp * 0.2;
      ctx.fillStyle = ent.color;
      ctx.beginPath(); ctx.arc(px, py, 4 + sp * 3, 0, Math.PI * 2); ctx.fill();
    }
    // Draw faint ghost at current position
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = ent.color;
    ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.r * 0.8, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Find score leader for crown
  let scoreLeader = null;
  if (gameMode !== 'elimination' && entities.length > 0) {
    scoreLeader = entities.reduce((a, b) => a.score > b.score ? a : b);
    if (scoreLeader.score <= 0) scoreLeader = null;
  }

  // Draw entities
  for (const ent of entities) {
    if (ent._portalHidden) continue;
    const isIt = itIndex === ent.index;

    // Trail
    for (let i = 0; i < ent.trail.length; i++) {
      const t = ent.trail[i];
      const a = i / ent.trail.length * 0.3;
      ctx.globalAlpha = a;
      ctx.fillStyle = ent.color;
      ctx.beginPath(); ctx.arc(t.x, t.y, ent.r * 0.6, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Shield aura
    if (ent.effects.shield) {
      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.5 + Math.sin(Date.now()/100)*0.3;
      ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.r + 8, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Freeze / tag-freeze indicator
    if (ent.effects.freeze || ent.tagFreezeTimer > 0) {
      ctx.fillStyle = ent.tagFreezeTimer > 0 ? 'rgba(255, 68, 68, 0.3)' : 'rgba(0, 212, 255, 0.3)';
      ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.r + 5, 0, Math.PI*2); ctx.fill();
    }

    // Bullet effect indicator
    if (ent.effects.bullet) {
      ctx.strokeStyle = '#88ff00';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.globalAlpha = 0.6 + Math.sin(Date.now()/150)*0.3;
      ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.r + 12, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;

      // Draw facing direction indicator
      const fx = ent.facingX, fy = ent.facingY;
      const flen = Math.hypot(fx, fy) || 1;
      const tipX = ent.x + (fx/flen) * (ent.r + 16);
      const tipY = ent.y + (fy/flen) * (ent.r + 16);
      ctx.strokeStyle = '#88ff00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ent.x + (fx/flen) * ent.r, ent.y + (fy/flen) * ent.r);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      // Arrowhead
      const arrowSize = 6;
      const aAngle = Math.atan2(fy, fx);
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - Math.cos(aAngle - 0.5) * arrowSize, tipY - Math.sin(aAngle - 0.5) * arrowSize);
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - Math.cos(aAngle + 0.5) * arrowSize, tipY - Math.sin(aAngle + 0.5) * arrowSize);
      ctx.stroke();
    }

    // Glow
    const glow = ctx.createRadialGradient(ent.x, ent.y, 0, ent.x, ent.y, ent.r * 2.5);
    glow.addColorStop(0, ent.color + '44');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.r * 2.5, 0, Math.PI*2); ctx.fill();

    // Body
    const isInfected = gameMode === 'infect' && ent.infected;
    ctx.fillStyle = (ent.tagFreezeTimer > 0) ? '#aa3333' : (isInfected ? '#dd2222' : ent.color);
    ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.r, 0, Math.PI*2); ctx.fill();

    // Eyes — clamp offset so they stay on the face
    const maxEyeOff = 3;
    let ex = ent.vx * 2, ey = ent.vy * 2;
    const eyeLen = Math.hypot(ex, ey);
    if (eyeLen > maxEyeOff) { ex = (ex / eyeLen) * maxEyeOff; ey = (ey / eyeLen) * maxEyeOff; }
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ent.x - 5 + ex, ent.y - 4 + ey, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ent.x + 5 + ex, ent.y - 4 + ey, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    const pex = ex * 1.3, pey = ey * 1.3;
    const pupilLen = Math.hypot(pex, pey);
    const mpx = pupilLen > maxEyeOff ? (pex / pupilLen) * maxEyeOff : pex;
    const mpy = pupilLen > maxEyeOff ? (pey / pupilLen) * maxEyeOff : pey;
    ctx.beginPath(); ctx.arc(ent.x - 5 + mpx, ent.y - 4 + mpy, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ent.x + 5 + mpx, ent.y - 4 + mpy, 2, 0, Math.PI*2); ctx.fill();

    // IT arrow (triangular pointing down at the entity)
    const showItArrow = isIt || (gameMode === 'infect' && ent.infected);
    if (showItArrow) {
      const arrowY = ent.y - ent.r - 22;
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.moveTo(ent.x, arrowY + 12);
      ctx.lineTo(ent.x - 9, arrowY);
      ctx.lineTo(ent.x + 9, arrowY);
      ctx.closePath();
      ctx.fill();
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('IT', ent.x, arrowY - 5);
    }

    // Stack labels above entity
    let aboveOffset = ent.r + 10;
    const isLeader = scoreLeader === ent;

    // IT arrow space
    if (showItArrow) aboveOffset += 22;

    // Crown on leading player
    if (isLeader && gameMode !== 'elimination') {
      ctx.fillStyle = '#ffd700';
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('\u{1F451}', ent.x, ent.y - aboveOffset);
      aboveOffset += 18;
    }

    // Score above character (classic mode)
    if (gameMode !== 'elimination') {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(Math.floor(ent.score) + '', ent.x, ent.y - aboveOffset);
    }

    // Name label
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ent.name + (ent.isHuman ? '' : ' (AI)'), ent.x, ent.y + ent.r + 18);
  }
}

let lastFrameTime = 0;
let dt = 16; // delta time in ms

function loop(timestamp) {
  if (lastFrameTime) {
    dt = Math.min(timestamp - lastFrameTime, 50); // cap at 50ms to avoid spiral
  }
  lastFrameTime = timestamp;
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  startScreen.style.display = 'none';
  init();
  gameRunning = true;
}

// Defaults
selectPlayers(1);
selectTime(120);
selectElimTime(30);
rebuildAIButtons();
buildOrbToggles();
requestAnimationFrame(loop);
</script>
</body>
